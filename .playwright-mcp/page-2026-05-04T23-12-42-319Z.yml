            - generic [ref=e791]:
              - generic [ref=e792]: "01"
              - generic [ref=e793]: Qu'est-ce que Google Ads et comment ça fonctionne ?
            - img [ref=e795]
          - paragraph [ref=e798]: Google Ads est une plateforme publicitaire au coût par clic (CPC) qui affiche vos annonces sur Google Search, YouTube et les sites partenaires. Vous ne payez que lorsque quelqu'un clique sur votre annonce. Le système fonctionne par enchères où vous misez sur des mots-clés pertinents pour votre activité.
        - generic [ref=e799]:
          - button "02 Quel budget prévoir pour Google Ads ?" [ref=e800] [cursor=pointer]:
            - generic [ref=e801]:
              - generic [ref=e802]: "02"
              - generic [ref=e803]: Quel budget prévoir pour Google Ads ?
            - img [ref=e805]
          - paragraph [ref=e808]: Le budget dépend de votre secteur, de la concurrence et de vos objectifs. Nous recommandons de commencer avec un budget test pour collecter des données, puis de scaler selon les performances. L'essentiel est de se concentrer sur le ROI, pas seulement sur les dépenses. Nous vous aidons à allouer efficacement le budget entre Search, Display et YouTube.
        - generic [ref=e809]:
          - button "03 Combien de temps avant de voir des résultats avec Google Ads ?" [ref=e810] [cursor=pointer]:
            - generic [ref=e811]:
              - generic [ref=e812]: "03"
              - generic [ref=e813]: Combien de temps avant de voir des résultats avec Google Ads ?
            - img [ref=e815]
          - paragraph [ref=e818]: Contrairement au SEO, Google Ads peut générer du trafic immédiatement une fois vos campagnes en ligne. Cependant, l'optimisation prend du temps. Comptez 2-4 semaines de phase d'apprentissage pour collecter des données, puis des améliorations continues. La plupart des clients voient des résultats significatifs dès le premier mois.
        - generic [ref=e819]:
          - button "04 Quelle différence entre campagnes Search et Display ?" [ref=e820] [cursor=pointer]:
            - generic [ref=e821]:
              - generic [ref=e822]: "04"
              - generic [ref=e823]: Quelle différence entre campagnes Search et Display ?
            - img [ref=e825]
          - paragraph [ref=e828]: Les campagnes Search affichent des annonces textuelles aux personnes recherchant activement vos mots-clés sur Google. Les campagnes Display affichent des publicités visuelles sur des millions de sites web pour développer la notoriété. Search capture les utilisateurs à haute intention, tandis que Display aide au remarketing et à la notoriété de marque.
        - generic [ref=e829]:
          - button "05 Comment trackez-vous les conversions et mesurez le succès ?" [ref=e830] [cursor=pointer]:
            - generic [ref=e831]:
              - generic [ref=e832]: "05"
              - generic [ref=e833]: Comment trackez-vous les conversions et mesurez le succès ?
            - img [ref=e835]
          - paragraph [ref=e838]: Nous implémentons Google Tag Manager et le suivi des conversions pour mesurer les leads, ventes, appels téléphoniques et autres actions de valeur. Vous recevez des tableaux de bord personnalisés montrant le ROAS, le coût par acquisition et autres KPIs. Nous intégrons avec votre CRM pour une attribution full-funnel.
        - generic [ref=e839]:
          - button "06 Gérez-vous la publicité YouTube ?" [ref=e840] [cursor=pointer]:
            - generic [ref=e841]:
              - generic [ref=e842]: "06"
              - generic [ref=e843]: Gérez-vous la publicité YouTube ?
            - img [ref=e845]
          - paragraph [ref=e848]: Oui ! YouTube fait partie de l'écosystème Google Ads. Nous créons et gérons des campagnes vidéo incluant les annonces in-stream désactivables, les bumper ads et les annonces discovery. La vidéo est puissante pour la notoriété B2B et les stratégies de remarketing.
