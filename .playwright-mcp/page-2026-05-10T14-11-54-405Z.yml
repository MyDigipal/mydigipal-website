                - cell "30 minutes" [ref=e87]
          - paragraph [ref=e88]: "La logique du workflow fonctionne ainsi : un déclencheur s’active lorsqu’un nouvel article est publié sur votre CMS (via webhook ou flux RSS). n8n récupère le contenu complet, l’envoie à OpenAI avec des prompts spécifiques à chaque canal, formate les résultats dans un Google Doc ou une page Notion, et envoie un message Slack à votre responsable contenu pour une relecture finale avant publication."
          - paragraph [ref=e89]:
            - text: La clé pour obtenir des résultats de qualité avec ce workflow réside dans l’ingénierie des prompts. Plutôt que de demander à OpenAI de « rédiger un post LinkedIn sur cet article », fournissez-lui vos directives de ton de marque, la description de votre audience cible et 2 à 3 exemples de vos meilleurs posts. C’est exactement le type de workflow que notre équipe
            - link "contenu IA" [ref=e90] [cursor=pointer]:
              - /url: /en/services/ai-content
            - text: aide les entreprises B2B à construire et optimiser.
          - 'heading "Workflow 3 : Surveillance des signaux d’intention et déclencheurs de prospection automatisés" [level=2] [ref=e91]'
          - paragraph [ref=e92]: Les décisions d’achat B2B sont rarement spontanées. Elles sont précédées de semaines de recherche — des offres d’emploi qui signalent un nouveau budget, des recrutements de dirigeants qui suggèrent des pivots stratégiques, des annonces de levées de fonds qui indiquent une phase de croissance. Le problème, c’est que surveiller ces signaux manuellement sur des dizaines de comptes cibles est impossible à grande échelle.
          - paragraph [ref=e93]: "n8n résout ce problème avec un workflow de surveillance des signaux d’intention :"
          - list [ref=e94]:
            - listitem [ref=e95]:
              - strong [ref=e96]: Déclencheur planifié
              - text: ": Exécution chaque matin à 7h"
            - listitem [ref=e97]:
              - strong [ref=e98]: Sources de données
              - text: ": Récupération depuis les pages entreprises LinkedIn, l’API Crunchbase et les flux RSS Google News pour la liste de comptes cibles"
            - listitem [ref=e99]:
              - strong [ref=e100]: Analyse IA
              - text: ": Envoi de chaque mise à jour à OpenAI avec le prompt : « Ce signal indique-t-il une intention d’achat pour [votre catégorie de produit] ? Notez de 1 à 10 et expliquez pourquoi »"
            - listitem [ref=e101]:
              - strong [ref=e102]: Filtrage
              - text: ": Seuls les signaux avec un score de 7 ou plus passent à l’étape suivante"
            - listitem [ref=e103]:
              - strong [ref=e104]: Création de tâche CRM
              - text: ": Création d’une tâche de suivi dans HubSpot assignée au responsable du compte avec la justification IA"
            - listitem [ref=e105]:
              - strong [ref=e106]: Brouillon d’email personnalisé
              - text: ": Génération d’un email de prospection personnalisé faisant référence à l’événement déclencheur spécifique"
          - paragraph [ref=e107]:
            - text: Ce workflow transforme votre
            - link "email marketing" [ref=e108] [cursor=pointer]:
              - /url: /en/services/emailing
            - text: de séquences génériques en une prospection véritablement opportune et pertinente. Les entreprises utilisant des déclencheurs basés sur l’intention constatent des taux de réponse 3 à 5 fois supérieurs à ceux des séquences de prospection à froid classiques.
          - 'heading "Workflow 4 : Agent de qualité et déduplication des données CRM" [level=2] [ref=e109]'
          - paragraph [ref=e110]: Les données CRM de mauvaise qualité constituent l’un des problèmes les plus coûteux du marketing B2B, et pourtant elles sont rarement priorisées — jusqu’à ce qu’elles provoquent un incident visible, comme l’envoi du même email cinq fois à un prospect qui existe sous trois contacts différents. Selon Experian, la mauvaise qualité des données coûte en moyenne 12,9 millions de dollars par an aux organisations.
          - paragraph [ref=e111]: n8n peut exécuter un workflow hebdomadaire d’hygiène CRM qui utilise l’IA pour identifier et résoudre automatiquement les problèmes de qualité des données.
          - table [ref=e112]:
