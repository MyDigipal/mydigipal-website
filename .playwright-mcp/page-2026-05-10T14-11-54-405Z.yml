          - 'heading "Par où commencer : construire soi-même ou faire appel à un partenaire" [level=2] [ref=e185]'
          - paragraph [ref=e186]: Avant de vous lancer dans la construction de ces workflows, il vaut la peine de faire une évaluation honnête de la capacité de votre équipe. n8n est véritablement no-code pour les workflows simples, mais les workflows propulsés par l’IA décrits ci-dessus impliquent une authentification API, de l’ingénierie de prompts, une logique conditionnelle et la gestion des erreurs. Ils sont tout à fait réalisables par un marketeur curieux techniquement — mais ils nécessitent quelques jours d’effort concentré par workflow.
