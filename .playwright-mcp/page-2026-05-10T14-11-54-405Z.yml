                - cell "Hebdomadaire" [ref=e138]
          - paragraph [ref=e139]: La composante IA est particulièrement précieuse pour la normalisation des intitulés de poste. « VP Marketing », « Head of Marketing », « Directeur Marketing » et « CMO » peuvent tous représenter le même persona dans votre ICP, mais s’ils sont stockés de manière incohérente, votre segmentation et votre personnalisation s’effondrent. Un nœud OpenAI peut les classifier et les standardiser à grande échelle en quelques secondes.
          - paragraph [ref=e140]:
            - text: Pour les équipes utilisant nos services de
            - link "tracking et reporting" [ref=e141] [cursor=pointer]:
              - /url: /en/services/tracking-reporting
            - text: ", des données CRM propres sont fondamentales — le principe « garbage in, garbage out » s’applique directement à la modélisation d’attribution et au reporting pipeline."
          - 'heading "Workflow 5 : Synthétiseur de performance multi-canal des campagnes" [level=2] [ref=e142]'
          - paragraph [ref=e143]: Les équipes marketing qui gèrent des campagnes sur Google Ads, LinkedIn, l’email et la recherche organique passent des heures chaque semaine à extraire des données de différentes plateformes, à les copier dans des tableurs et à construire des rapports manuels. C’est du temps qui devrait être consacré à la stratégie et à l’optimisation, pas à la manipulation de données.
          - paragraph [ref=e144]: Un workflow n8n de synthèse des performances de campagne peut collecter les données de tous vos canaux, demander à l’IA d’identifier les insights clés, et livrer automatiquement un briefing hebdomadaire formaté dans le canal Slack de votre équipe ou dans votre boîte mail.
          - paragraph [ref=e145]: "Voici l’architecture du workflow :"
          - list [ref=e146]:
            - listitem [ref=e147]:
              - strong [ref=e148]: Déclencheur planifié
              - text: ": Chaque lundi à 8h"
            - listitem [ref=e149]:
              - strong [ref=e150]: Collecte de données
              - text: ": Récupération des 7 derniers jours depuis l’API Google Ads, l’API LinkedIn Campaign Manager, les analytics email HubSpot et Google Analytics 4"
            - listitem [ref=e151]:
              - strong [ref=e152]: Formatage des données
              - text: ": Normalisation des métriques dans une structure cohérente (impressions, clics, conversions, coût par conversion)"
            - listitem [ref=e153]:
              - strong [ref=e154]: Analyse IA
              - text: ": Envoi du jeu de données combiné à OpenAI avec le prompt : « Tu es un analyste marketing B2B. Identifie les 3 principales réussites, les 3 principaux points de vigilance et ta recommandation la plus importante basée sur ces données »"
            - listitem [ref=e155]:
              - strong [ref=e156]: Génération du rapport
              - text: ": Formatage de l’analyse IA et des données brutes dans un message Slack structuré ou un email"
            - listitem [ref=e157]:
              - strong [ref=e158]: Livraison
              - text: ": Envoi dans le canal Slack de l’équipe marketing avec le CMO en copie"
