        - paragraph [ref=e159]: The AI component here is particularly valuable for job title normalization. “VP of Marketing,” “Head of Marketing,” “Marketing Director,” and “CMO” might all represent the same persona in your ICP, but if they are stored inconsistently, your segmentation and personalization fall apart. An OpenAI node can classify and standardize these at scale in seconds.
        - paragraph [ref=e160]:
          - text: For teams using our
          - link "tracking and reporting" [ref=e161] [cursor=pointer]:
            - /url: /en/services/tracking-reporting
          - text: services, clean CRM data is foundational — garbage in, garbage out applies directly to attribution modeling and pipeline reporting.
        - 'heading "Workflow 5: Multi-Channel Campaign Performance Summarizer" [level=2] [ref=e162]'
        - paragraph [ref=e163]: Marketing teams running campaigns across Google Ads, LinkedIn, email, and organic search spend hours every week pulling data from different platforms, copying it into spreadsheets, and building manual reports. This is time that should be spent on strategy and optimization, not data wrangling.
        - paragraph [ref=e164]: An n8n campaign performance summarizer workflow can pull data from all your channels, have AI identify the key insights, and deliver a formatted weekly briefing to your team’s Slack channel or inbox — automatically.
        - paragraph [ref=e165]: "Here is the workflow architecture:"
        - list [ref=e166]:
          - listitem [ref=e167]:
            - strong [ref=e168]: Scheduled trigger
            - text: ": Every Monday at 8 AM"
          - listitem [ref=e169]:
            - strong [ref=e170]: Data collection
            - text: ": Pull last 7 days of data from Google Ads API, LinkedIn Campaign Manager API, HubSpot email analytics, and Google Analytics 4"
          - listitem [ref=e171]:
            - strong [ref=e172]: Data formatting
            - text: ": Normalize metrics into a consistent structure (impressions, clicks, conversions, cost per conversion)"
          - listitem [ref=e173]:
            - strong [ref=e174]: AI analysis
            - text: ": Send the combined dataset to OpenAI with the prompt: “You are a B2B marketing analyst. Identify the top 3 wins, top 3 concerns, and your single most important recommendation based on this data”"
          - listitem [ref=e175]:
            - strong [ref=e176]: Report generation
            - text: ": Format the AI analysis plus raw data into a structured Slack message or email"
          - listitem [ref=e177]:
            - strong [ref=e178]: Delivery
            - text: ": Send to the marketing team Slack channel and CC the CMO"
        - table [ref=e179]:
